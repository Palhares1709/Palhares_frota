<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frota Palhares</title>
  <style>
    :root { --primary: #1a4d2e; --error: #c0392b; --success: #27ae60; }
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 20px; display: flex; justify-content: center; }
    
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 420px; margin: auto; }
    h2 { color: var(--primary); text-align: center; margin-top: 0; font-size: 26px; }

    #modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; padding: 40px; border-radius: 20px; text-align: center;
      width: 85%; max-width: 400px; animation: bounce 0.4s ease;
    }
    @keyframes bounce { 0% {transform: scale(0.7);} 100% {transform: scale(1);} }
    
    #modal-msg { font-size: 24px; font-weight: bold; margin-bottom: 20px; display: block; }
    .btn-fechar { background: #333; color: white; padding: 12px 30px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }

    .field { margin-bottom: 12px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 14px; }
    input, select { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
    input:focus { border-color: var(--primary); }
    
    .btn-principal { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .btn-principal:disabled { background: #999; }
  </style>
</head>
<body>

  <div id="modal">
    <div class="modal-content">
      <span id="modal-msg"></span>
      <button class="btn-fechar" onclick="fecharModal()">OK, ENTENDI</button>
    </div>
  </div>

  <div class="card">
    <h2>FROTA PALHARES 🚚</h2>
    
    <div class="field">
      <label>Veículo</label>
      <select id="veiculo">
        <option value="CrossFox">CrossFox (Red)</option>
        <option value="Doblò">Doblò</option>
      </select>
    </div>

    <div class="field">
      <label>Tipo de Registro</label>
      <select id="tipo">
        <option value="Abastecimento">Abastecimento</option>
        <option value="Manutenção">Manutenção</option>
      </select>
    </div>

    <div class="field">
      <label>KM ATUAL</label>
      <input type="number" id="km" inputmode="numeric" placeholder="000.000">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div class="field">
        <label>Litros</label>
        <input type="number" id="litros" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Valor Total R$</label>
        <input type="number" id="valor" step="0.01" inputmode="decimal">
      </div>
    </div>

    <div class="field">
      <label>Observação</label>
      <input type="text" id="obs" placeholder="Ex: Posto tal, Troca de óleo...">
    </div>

    <button id="btn-save" class="btn-principal" onclick="processarEnvio()">SALVAR REGISTRO</button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7rwKhDnl5hAsyuJhi4iHNG3h78Tz1uwfDHpr5xl6DHsht1n4pY722hvZxQmY9caiapw/exec"; 

    function abrirModal(texto, cor) {
      const modal = document.getElementById("modal");
      const msg = document.getElementById("modal-msg");
      msg.innerText = texto;
      msg.style.color = cor;
      modal.style.display = "flex";
    }

    function fecharModal() {
      document.getElementById("modal").style.display = "none";
    }

    async function processarEnvio() {
      const btn = document.getElementById("btn-save");
      const veiculo = document.getElementById("veiculo").value;
      const kmDigitado = parseFloat(document.getElementById("km").value);

      if(!kmDigitado) {
        abrirModal("⚠️ DIGITE O KM!", "orange");
        return;
      }

      btn.disabled = true;
      btn.innerText = "VERIFICANDO...";

      try {
        const response = await fetch(`${SCRIPT_URL}?getUltimoKM=${veiculo}`);
        const ultimoKM = parseFloat(await response.text());

        if (kmDigitado <= ultimoKM) {
          abrirModal(`❌ ERRO: KM ATUAL (${kmDigitado}) É MENOR OU IGUAL AO ÚLTIMO (${ultimoKM})!`, "var(--error)");
          btn.disabled = false;
          btn.innerText = "SALVAR REGISTRO";
          return;
        }

        const dados = {
          veiculo: veiculo,
          tipo: document.getElementById("tipo").value, // Captura o tipo
          km: kmDigitado,
          litros: parseFloat(document.getElementById("litros").value) || 0,
          valor: parseFloat(document.getElementById("valor").value) || 0,
          obs: document.getElementById("obs").value // Captura a observação
        };

        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(dados)
        });

        abrirModal("✅ REGISTRO SALVO COM SUCESSO!", "var(--success)");
        
        // Limpa os campos
        document.getElementById("km").value = "";
        document.getElementById("litros").value = "";
        document.getElementById("valor").value = "";
        document.getElementById("obs").value = "";

      } catch (e) {
        abrirModal("❌ ERRO DE CONEXÃO!", "var(--error)");
      } finally {
        btn.disabled = false;
        btn.innerText = "SALVAR REGISTRO";
      }
    }
  </script>
</body>
</html>
