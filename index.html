<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Importando fontes modernas do Google -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --primary: #2e7d32; 
      --bg: #f0f2f5; 
      --card-bg: #ffffff;
      --text: #2c3e50;
    }
    
    body { 
      font-family: 'Poppins', sans-serif; /* Fonte moderna aplicada */
      background: var(--bg); 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      color: var(--text);
    }

    .card { 
      background: var(--card-bg); 
      padding: 25px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
      width: 100%; 
      max-width: 400px; 
    }

    h2 { 
      color: var(--primary); 
      text-align: center; 
      margin-top: 0; 
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .stats { 
      background: #f1f8e9; 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      border-left: 6px solid var(--primary); 
    }

    .stats p { 
      margin: 5px 0; 
      font-size: 14px; 
      font-weight: 400;
    }

    .field { margin-bottom: 18px; }

    label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: 600; 
      font-size: 12px; 
      color: #7f8c8d; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea { 
      width: 100%; 
      padding: 12px; 
      border: 1.5px solid #e0e0e0; 
      border-radius: 10px; 
      box-sizing: border-box; 
      font-size: 15px; 
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    button { 
      width: 100%; 
      padding: 14px; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      font-weight: 600; 
      cursor: pointer; 
      font-size: 16px; 
      margin-top: 10px;
      transition: transform 0.1s, background 0.3s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background: #bdc3c7; }

    #msg { text-align: center; margin-top: 15px; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>
  
  <div id="historico" class="stats">
    <p>📊 <strong>Último KM:</strong> <span id="lastKm">...</span> km</p>
    <p>⛽ <strong>Média Anterior:</strong> <span id="lastMedia">...</span> km/l</p>
  </div>

  <div class="field">
    <label>Veículo</label>
    <select id="veiculo" onchange="atualizarInfo()">
      <option value="CrossFox">CrossFox (Red)</option>
      <option value="Doblò">Doblò</option>
      <option value="Outros">Caminhão 01</option>
    </select>
  </div>

  <div class="field">
    <label>Tipo de Registro</label>
    <select id="tipo">
      <option value="Abastecimento">⛽ Abastecimento</option>
      <option value="Manutenção">🛠️ Manutenção</option>
    </select>
  </div>

  <div class="field">
    <label>KM Atual</label>
    <input type="number" id="km" placeholder="000.000" inputmode="numeric">
  </div>

  <div class="field">
    <label>Litros / Quantidade</label>
    <input type="number" id="litros" step="0.01" placeholder="0,00">
  </div>

  <div class="field">
    <label>Valor Total (R$)</label>
    <input type="number" id="valor" step="0.01" placeholder="R$ 0,00">
  </div>

  <div class="field">
    <label>Observação</label>
    <textarea id="obs" rows="2" placeholder="Notas sobre o serviço..."></textarea>
  </div>

  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
  <div id="msg"></div>
</div>

<script>
  const WEB_APP_URL = "COLE_AQUI_SUA_URL_DO_GOOGLE"; // Mantenha sua URL aqui

  window.onload = atualizarInfo;

  function atualizarInfo() {
    const veiculo = document.getElementById("veiculo").value;
    fetch(`${WEB_APP_URL}?veiculo=${veiculo}`)
      .then(res => res.json())
      .then(res => {
        document.getElementById("lastKm").innerText = res.km;
        document.getElementById("lastMedia").innerText = res.media;
      });
  }

  function salvar() {
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const lastKm = parseFloat(document.getElementById("lastKm").innerText) || 0;
    const veiculo = document.getElementById("veiculo").value;
    
    const dados = {
      veiculo: veiculo,
      tipo: document.getElementById("tipo").value,
      km: parseFloat(document.getElementById("km").value),
      litros: parseFloat(document.getElementById("litros").value) || 0,
      valor: parseFloat(document.getElementById("valor").value) || 0,
      obs: document.getElementById("obs").value
    };

    if (!dados.km || dados.km <= lastKm) {
      msg.innerText = "⚠️ Erro no KM!";
      msg.style.color = "#e74c3c";
      return;
    }

    btn.disabled = true;
    msg.innerText = "⏳ Gravando...";

    fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(dados) })
    .then(res => res.text())
    .then(res => {
      if (res === "Sucesso") {
        fetch(`${WEB_APP_URL}?getMediaResumo=${veiculo}`)
          .then(r => r.text())
          .then(mediaGeral => {
            alert(`✅ Sucesso!\n\nVeículo: ${veiculo}\nMédia Geral Atualizada: ${mediaGeral} km/l`);
            location.reload(); 
          });
      }
    });
  }
</script>
</body>
</html>
