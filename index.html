<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frota Palhares</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%; max-width: 420px; }
    h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 24px; }
    .stats { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #1a73e8; }
    .stats p { margin: 5px 0; font-size: 14px; color: #5f6368; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; color: #3c4043; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #dadce0; box-sizing: border-box; font-size: 16px; outline: none; }
    input:focus { border-color: #1a73e8; }
    textarea { height: 70px; resize: none; }
    
    /* BOTÃO E ANIMAÇÃO */
    #btn { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.3s; margin-top: 10px; }
    #btn:hover { background-color: #1557b0; }
    #btn:disabled { background-color: #bdc1c6; cursor: not-allowed; }

    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1a73e8; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; display: none; margin: 15px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #msg { text-align: center; margin-top: 15px; font-weight: bold; color: #188038; display: none; font-size: 15px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>
  
  <div class="stats">
    <p>📊 <strong>Último Registro:</strong> <span id="lastKm">...</span> km</p>
    <p>⛽ <strong>Média Anterior:</strong> <span id="lastMedia">--</span> km/l</p>
  </div>

  <div class="field">
    <label>Veículo</label>
    <select id="veiculo" onchange="atualizarInfo()">
      <option value="CrossFox">CrossFox (Red)</option>
      <option value="Doblò">Doblò</option>
      <option value="Outros">Caminhão 01</option>
    </select>
  </div>

  <div class="field">
    <label>Tipo de Registro</label>
    <select id="tipo">
      <option value="Abastecimento">⛽ Abastecimento</option>
      <option value="Manutenção">🛠️ Manutenção</option>
    </select>
  </div>

  <div class="field">
    <label>KM Atual</label>
    <input type="number" id="km" placeholder="Ex: 125000">
  </div>

  <div class="field">
    <label>Quantidade (Litros)</label>
    <input type="number" id="litros" step="0.01" placeholder="Ex: 35.50">
  </div>

  <div class="field">
    <label>Valor Total (R$)</label>
    <input type="number" id="valor" step="0.01" placeholder="Ex: 200.00">
  </div>

  <div class="field">
    <label>Observação</label>
    <textarea id="obs" placeholder="Posto, detalhes da manutenção..."></textarea>
  </div>

  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
  
  <div id="loading" class="loader"></div>
  <div id="msg"></div>
</div>

<script>
  // IMPORTANTE: COLOQUE SUA URL ABAIXO
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw7rwKhDnl5hAsyuJhi4iHNG3h78Tz1uwfDHpr5xl6DHsht1n4pY722hvZxQmY9caiapw/exec";

  function salvar() {
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loading');
    const msg = document.getElementById('msg');
    
    // Inicia carregamento
    btn.disabled = true;
    msg.style.display = "none";
    loader.style.display = "block";

    const dados = {
      veiculo: document.getElementById('veiculo').value,
      tipo: document.getElementById('tipo').value,
      km: parseFloat(document.getElementById('km').value) || 0,
      litros: parseFloat(document.getElementById('litros').value) || 0,
      valor: parseFloat(document.getElementById('valor').value) || 0,
      obs: document.getElementById('obs').value || ""
    };

    fetch(URL_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(dados)
    })
    .then(() => {
      loader.style.display = "none";
      btn.disabled = false;
      msg.innerHTML = "Registro enviado com sucesso! ⛽✅🚀";
      msg.style.display = "block";
      
      // Limpa formulário
      document.getElementById('km').value = "";
      document.getElementById('litros').value = "";
      document.getElementById('valor').value = "";
      document.getElementById('obs').value = "";
      
      atualizarInfo();
    })
    .catch(err => {
      loader.style.display = "none";
      btn.disabled = false;
      alert("Erro ao conectar com o servidor.");
    });
  }

  function atualizarInfo() {
    const veiculo = document.getElementById('veiculo').value;
    fetch(URL_SCRIPT + "?veiculo=" + veiculo)
      .then(res => res.json())
      .then(data => {
        document.getElementById('lastKm').innerText = data.km;
        document.getElementById('lastMedia').innerText = data.media;
      })
      .catch(() => {
        document.getElementById('lastKm').innerText = "Erro";
      });
  }

  window.onload = atualizarInfo;
</script>

</body>
</html>
