<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Frota Palhares</title>
  <style>
    :root { --primary: #1a4d2e; --error: #d32f2f; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
    
    .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    h2 { color: var(--primary); text-align: center; font-size: 28px; margin-bottom: 20px; }

    /* Alerta de Erro Moderno e Gigante */
    #alerta-erro {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(211, 47, 47, 0.95); z-index: 9999; color: white;
      flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    #alerta-erro h1 { font-size: 80px; margin: 0; }
    #alerta-erro p { font-size: 24px; font-weight: bold; margin: 20px 0; }

    .field { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
    input, select { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; box-sizing: border-box; }
    
    .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 20px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; }
    .btn-save:disabled { background: #ccc; }
  </style>
</head>
<body>

  <div id="alerta-erro">
    <h1>⚠️</h1>
    <p id="erro-txt">KM INVÁLIDO!</p>
    <button onclick="fecharErro()" style="padding: 15px 40px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;">CORRIGIR AGORA</button>
  </div>

  <div class="card">
    <h2>FROTA PALHARES 🚚</h2>
    
    <div class="field">
      <label>Veículo</label>
      <select id="veiculo">
        <option value="CrossFox">CrossFox (Red)</option>
        <option value="Doblò">Doblò</option>
      </select>
    </div>

    <div class="field">
      <label>KM Atual</label>
      <input type="number" id="km" inputmode="numeric" placeholder="000.000">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div class="field">
        <label>Litros</label>
        <input type="number" id="litros" step="0.01">
      </div>
      <div class="field">
        <label>Valor Total R$</label>
        <input type="number" id="valor" step="0.01">
      </div>
    </div>

    <button id="btn" class="btn-save" onclick="validarESalvar()">SALVAR REGISTRO</button>
  </div>

  <script>
    const SCRIPT_URL = "SUA_URL_AQUI"; // <--- COLE A NOVA URL DO GOOGLE AQUI

    function fecharErro() { document.getElementById("alerta-erro").style.display = "none"; }

    async function validarESalvar() {
      const btn = document.getElementById("btn");
      const veiculo = document.getElementById("veiculo").value;
      const kmDigitado = parseFloat(document.getElementById("km").value);

      if(!kmDigitado) return;

      btn.disabled = true;
      btn.innerText = "VERIFICANDO KM...";

      try {
        // Busca o último KM direto na planilha antes de salvar
        const res = await fetch(`${SCRIPT_URL}?getUltimoKM=${veiculo}`);
        const ultimoKM = parseFloat(await res.text());

        if (kmDigitado <= ultimoKM) {
          document.getElementById("erro-txt").innerHTML = `ERRO CRÍTICO!<br>O KM ${kmDigitado} é menor ou igual ao último registro (${ultimoKM}).`;
          document.getElementById("alerta-erro").style.display = "flex";
          btn.disabled = false;
          btn.innerText = "SALVAR REGISTRO";
          return;
        }

        // Se o KM for válido, prossegue com o salvamento
        const dados = {
          veiculo: veiculo,
          km: kmDigitado,
          litros: parseFloat(document.getElementById("litros").value) || 0,
          valor: parseFloat(document.getElementById("valor").value) || 0
        };

        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(dados)
        });

        alert("✅ REGISTRADO COM SUCESSO!");
        location.reload();

      } catch (e) {
        alert("Erro de conexão com a planilha.");
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
