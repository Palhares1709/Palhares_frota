<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de abastecimento/Manutenção | Gestão 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #1a73e8; 
      --primary-dark: #1557b0;
      --error: #d93025; 
      --success: #188038; 
      --dark: #202124; 
      --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d7e2ed 100%);
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--bg-gradient); 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; /* Alinhado ao topo para mobile */
      min-height: 100vh; 
      margin: 0; 
      padding-top: 20px; /* Pequeno respiro no topo */
    }
    
    .card { 
      background: #ffffff; 
      padding: 20px 30px 30px 30px; /* Reduzi o padding superior de 35px para 20px */
      border-radius: 28px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
      width: 100%; 
      max-width: 420px; 
      border: 1px solid rgba(255,255,255,0.8);
      margin-bottom: 20px;
    }

    h2 { 
      text-align: center; 
      font-weight: 900; 
      letter-spacing: -1.5px; 
      color: var(--dark); 
      margin-top: 10px; /* Reduzi a margem do título */
      margin-bottom: 20px; 
    }

    .tabs { 
      display: flex; 
      gap: 8px; 
      margin-bottom: 20px; 
      background: #eef2f7; 
      padding: 6px; 
      border-radius: 14px; 
    }
    .tab-btn { 
      flex: 1; 
      padding: 10px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 700; 
      font-size: 13px; 
      transition: 0.3s; 
      background: transparent; 
      color: #5f6368; 
    }
    .tab-btn.active { 
      background: var(--primary); 
      color: white; 
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); 
    }

    .stats { 
      background: #f8fbff; 
      padding: 15px; 
      border-radius: 18px; 
      margin-bottom: 20px; 
      border: 1px solid #d1e3fa; 
    }
    .stats p { 
      margin: 8px 0; 
      font-size: 14px; 
      font-weight: 700; 
      color: #444; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .stats p span:last-child {
      background: #fff;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid #e0e6ed;
    }
    
    label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: 700; 
      font-size: 11px; 
      text-transform: uppercase; 
      color: #5f6368; 
      letter-spacing: 1px; 
    }

    input, select, textarea { 
      width: 100%; 
      padding: 12px; 
      border-radius: 12px; 
      border: 2px solid #eef2f7; 
      margin-bottom: 12px; 
      font-family: 'Inter'; 
      font-size: 15px; 
      box-sizing: border-box; 
      background-color: #fcfdfe;
      transition: all 0.3s;
    }
    input:focus, select:focus, textarea:focus { 
      border-color: var(--primary); 
      outline: none; 
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
    }
    
    #btn { 
      width: 100%; 
      padding: 16px; 
      background: var(--dark); 
      color: white; 
      border: none; 
      border-radius: 14px; 
      font-weight: 700; 
      font-size: 16px; 
      cursor: pointer; 
      transition: 0.3s; 
      margin-top: 5px; 
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
    #btn:hover { 
      background: #000; 
      transform: translateY(-2px); 
    }
    #btn:disabled { 
      background: #ccc; 
      cursor: not-allowed; 
    }

    .modal-overlay { 
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(32, 33, 36, 0.8); 
      display: none; align-items: center; justify-content: center; z-index: 1000; 
      backdrop-filter: blur(4px);
    }
    .modal { 
      background: white; 
      padding: 35px; 
      border-radius: 24px; 
      text-align: center; 
      max-width: 320px; 
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .modal button { 
      background: var(--primary); 
      color: white; 
      border: none; 
      padding: 14px 35px; 
      border-radius: 12px; 
      font-weight: 700; 
      cursor: pointer; 
      margin-top: 25px; 
      width: 100%;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>

  <div class="tabs">
    <button id="tabAbast" class="tab-btn active" onclick="mudarTipo('Abastecimento', this)">⛽ Abastecimento</button>
    <button id="tabManut" class="tab-btn" onclick="mudarTipo('Manutenção', this)">🛠️ Manutenção</button>
  </div>
  
  <div class="stats">
    <p><span>📊 Último KM:</span> <span id="lastKm" style="color:var(--dark)">...</span></p>
    <p><span>🏆 Média Total:</span> <span id="lastMedia" style="color:var(--primary)">--</span></p>
  </div>

  <label>Veículo</label>
  <select id="veiculo" onchange="atualizarInfo()">
    <option value="CrossFox">CrossFox (Red)</option>
    <option value="Doblò">Doblò</option>
  </select>

  <label id="labelTipo">Dados do Abastecimento</label>
  <div id="camposDinamicos">
    <input type="number" id="km" placeholder="KM Atual">
    <input type="number" id="litros" step="0.01" placeholder="Litros">
    <input type="number" id="valor" step="0.01" placeholder="Valor Total R$">
  </div>

  <label>Observação</label>
  <textarea id="obs" placeholder="Posto, peças, etc..."></textarea>

  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal"><h3 id="mTitle"></h3><p id="mText"></p><button onclick="fecharModal()">ENTENDIDO</button></div>
</div>

<script>
  // ATUALIZE COM SUA URL
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw7rwKhDnl5hAsyuJhi4iHNG3h78Tz1uwfDHpr5xl6DHsht1n4pY722hvZxQmY9caiapw/exec"; 
  let kmReferencia = 0;
  let tipoAtual = "Abastecimento";

  function mudarTipo(tipo, btn) {
    tipoAtual = tipo;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('labelTipo').innerText = "Dados de " + tipo;
    const campoLitros = document.getElementById('litros');
    campoLitros.style.display = (tipo === "Manutenção") ? "none" : "block";
  }

  function abrirModal(tit, tex, cor) {
    document.getElementById('mTitle').innerText = tit;
    document.getElementById('mTitle').style.color = cor;
    document.getElementById('mText').innerText = tex;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function fecharModal() { document.getElementById('modalOverlay').style.display = 'none'; }

  function salvar() {
    const km = parseFloat(document.getElementById('km').value) || 0;
    const btnSalvar = document.getElementById('btn');

    if (km <= kmReferencia) {
      abrirModal("KM Inválido ⚠️", "O KM deve ser maior que " + kmReferencia + ".", "#d93025");
      return;
    }

    btnSalvar.disabled = true;
    const dados = {
      veiculo: document.getElementById('veiculo').value,
      km: km,
      litros: parseFloat(document.getElementById('litros').value) || 0,
      valor: parseFloat(document.getElementById('valor').value) || 0,
      tipo: tipoAtual,
      obs: document.getElementById('obs').value
    };

    fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) })
      .then(res => res.text())
      .then(txt => {
        btnSalvar.disabled = false;
        if (txt === "Sucesso") {
          abrirModal("Sucesso! ✅", "Registro salvo.", "#188038");
          document.getElementById('km').value = "";
          document.getElementById('litros').value = "";
          document.getElementById('valor').value = "";
          document.getElementById('obs').value = "";
          atualizarInfo();
        } else {
          abrirModal("Atenção ⚠️", txt, "#d93025");
        }
      });
  }

  function atualizarInfo() {
    const v = document.getElementById('veiculo').value;
    fetch(URL_SCRIPT + "?veiculo=" + v)
      .then(r => r.json())
      .then(d => {
        kmReferencia = parseFloat(d.km) || 0;
        document.getElementById('lastKm').innerText = d.km + " km";
        document.getElementById('lastMedia').innerText = d.media + " km/l";
      });
  }
  window.onload = atualizarInfo;
</script>
</body>
</html>
