<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --primary: #2e7d32; --bg: #f4f7f6; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { color: var(--primary); text-align: center; margin-top: 0; }
    .stats { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
    .stats p { margin: 5px 0; font-size: 14px; color: #333; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #666; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
    button:disabled { background: #ccc; }
    #msg { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>
  
  <div id="historico" class="stats">
    <p>📊 <strong>Último KM:</strong> <span id="lastKm">...</span> km</p>
    <p>⛽ <strong>Média Anterior:</strong> <span id="lastMedia">...</span> km/l</p>
  </div>

  <div class="field">
    <label>Veículo</label>
    <select id="veiculo" onchange="atualizarInfo()">
      <option value="CrossFox">CrossFox (Red)</option>
      <option value="Doblò">Doblò</option>
      <option value="Outros">Caminhão 01</option>
    </select>
  </div>

  <div class="field">
    <label>Tipo de Registro</label>
    <select id="tipo">
      <option value="Abastecimento">⛽ Abastecimento</option>
      <option value="Manutenção">🛠️ Manutenção</option>
    </select>
  </div>

  <div class="field">
    <label>KM Atual</label>
    <input type="number" id="km" placeholder="Digite o KM atual" inputmode="numeric">
  </div>

  <div class="field">
    <label>Litros / Quantidade</label>
    <input type="number" id="litros" step="0.01" placeholder="Ex: 45.50">
  </div>

  <div class="field">
    <label>Valor Total (R$)</label>
    <input type="number" id="valor" step="0.01" placeholder="Ex: 250.00">
  </div>

  <div class="field">
    <label>Observação</label>
    <textarea id="obs" rows="2" placeholder="Opcional..."></textarea>
  </div>

  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
  <div id="msg"></div>
</div>

<script>
  // COLOQUE A URL DO GOOGLE ABAIXO
  const WEB_APP_URL = "COLE_AQUI_SUA_URL_DO_GOOGLE";

  window.onload = atualizarInfo;

  function atualizarInfo() {
    const veiculo = document.getElementById("veiculo").value;
    fetch(`${WEB_APP_URL}?veiculo=${veiculo}`)
      .then(res => res.json())
      .then(res => {
        document.getElementById("lastKm").innerText = res.km;
        document.getElementById("lastMedia").innerText = res.media;
      });
  }

  function salvar() {
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const lastKm = parseFloat(document.getElementById("lastKm").innerText) || 0;
    const veiculo = document.getElementById("veiculo").value;
    
    const dados = {
      veiculo: veiculo,
      tipo: document.getElementById("tipo").value,
      km: parseFloat(document.getElementById("km").value),
      litros: parseFloat(document.getElementById("litros").value) || 0,
      valor: parseFloat(document.getElementById("valor").value) || 0,
      obs: document.getElementById("obs").value
    };

    if (!dados.km || dados.km <= lastKm) {
      msg.innerText = "⚠️ Erro no KM!";
      msg.style.color = "red";
      return;
    }

    btn.disabled = true;
    msg.innerText = "⏳ Gravando...";

    fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(dados) })
    .then(res => res.text())
    .then(res => {
      if (res === "Sucesso") {
        fetch(`${WEB_APP_URL}?getMediaResumo=${veiculo}`)
          .then(r => r.text())
          .then(mediaGeral => {
            alert(`✅ Sucesso!\n\nVeículo: ${veiculo}\nMédia Geral Atualizada: ${mediaGeral} km/l`);
            location.reload(); 
          });
      }
    });
  }
</script>
</body>
</html>
