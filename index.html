<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestão de Frota - CMR</title>
  <style>
    :root { --primary: #1a4d2e; --bg: #f4f7f6; --white: #ffffff; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
    .field { margin-bottom: 15px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    #msg { text-align: center; margin-top: 20px; font-weight: 600; min-height: 24px; }
    
    /* Esconde o formulário inicialmente */
    #formulario { display: none; }
    #telaLogin { display: block; }
  </style>
</head>
<body>

  <div id="telaLogin" class="card">
    <h2>Acesso Restrito 🔒</h2>
    <div class="field">
      <label>Digite a Chave de Acesso</label>
      <input type="password" id="chave" placeholder="****" inputmode="numeric">
    </div>
    <button onclick="verificarSenha()">ENTRAR</button>
    <div id="msgLogin" style="text-align:center; color:red; margin-top:10px;"></div>
  </div>

  <div id="formulario" class="card">
    <h2>Frota Palhares 🚚</h2>
    <div class="field">
      <label>Veículo</label>
      <select id="veiculo">
        <option value="CrossFox">CrossFox (Red)</option>
        <option value="Doblô">Doblò</option>
        <option value="Outros">Caminhão 01</option>
      </select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="tipo">
        <option value="Abastecimento">Abastecimento</option>
        <option value="Manutenção">Manutenção</option>
      </select>
    </div>
    <div class="field">
      <label>KM Atual</label>
      <input type="number" id="km" inputmode="numeric">
    </div>
    <div class="grid">
      <div class="field"><label>Litros</label><input type="number" id="litros" step="0.01" inputmode="decimal"></div>
      <div class="field"><label>Valor Total</label><input type="number" id="valor" step="0.01" inputmode="decimal"></div>
    </div>
    <div class="field">
      <label>Observação</label>
      <input type="text" id="obs">
    </div>
    <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
    <div id="msg"></div>
  </div>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw7rwKhDnl5hAsyuJhi4iHNG3h78Tz1uwfDHpr5xl6DHsht1n4pY722hvZxQmY9caiapw/exec";
    const SENHA_CORRETA = "1234"; // <--- MUDE SUA SENHA AQUI!

    function verificarSenha() {
      const senhaDigitada = document.getElementById("chave").value;
      if(senhaDigitada === SENHA_CORRETA) {
        document.getElementById("telaLogin").style.display = "none";
        document.getElementById("formulario").style.display = "block";
      } else {
        document.getElementById("msgLogin").innerText = "❌ Chave incorreta!";
      }
    }

    async function salvar() {
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      const dados = {
        veiculo: document.getElementById("veiculo").value,
        tipo: document.getElementById("tipo").value,
        km: parseFloat(document.getElementById("km").value),
        litros: parseFloat(document.getElementById("litros").value) || 0,
        valor: parseFloat(document.getElementById("valor").value) || 0,
        obs: document.getElementById("obs").value
      };

      if(!dados.km) {
        msg.innerText = "⚠️ KM é obrigatório!";
        msg.style.color = "red";
        return;
      }

      btn.disabled = true;
      msg.innerText = "⏳ Gravando...";
      
      try {
        await fetch(URL_SCRIPT, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });
        msg.innerText = "✅ Registrado com Sucesso!";
        msg.style.color = "green";
        document.getElementById("km").value = "";
        document.getElementById("litros").value = "";
        document.getElementById("valor").value = "";
        document.getElementById("obs").value = "";
      } catch (err) {
        msg.innerText = "❌ Erro ao salvar.";
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
