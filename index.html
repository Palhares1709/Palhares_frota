<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { color: #2c3e50; text-align: center; margin-top: 0; }
    .stats { background: #ecf0f1; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; color: #34495e; }
    input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dcdde1; box-sizing: border-box; font-size: 1em; }
    textarea { height: 80px; resize: none; }
    
    /* BOTÃO E LOADER */
    #btn { width: 100%; padding: 15px; background-color: #1b3022; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
    #btn:disabled { background-color: #95a5a6; }
    
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #27ae60; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 15px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #msg { text-align: center; margin-top: 15px; font-weight: bold; color: #27ae60; display: none; }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>
  
  <div class="stats">
    <p>📊 <strong>Último Registro:</strong> <span id="lastKm">Carregando...</span> km</p>
    <p>⛽ <strong>Média Anterior:</strong> <span id="lastMedia">--</span> km/l</p>
  </div>

  <div class="field">
    <label>Veículo</label>
    <select id="veiculo" onchange="atualizarInfo()">
      <option value="CrossFox">CrossFox (Red)</option>
      <option value="Doblò">Doblò</option>
      <option value="Outros">Caminhão 01</option>
    </select>
  </div>

  <div class="field">
    <label>Tipo de Registro</label>
    <select id="tipo">
      <option value="Abastecimento">⛽ Abastecimento</option>
      <option value="Manutenção">🛠️ Manutenção</option>
    </select>
  </div>

  <div class="field">
    <label>KM Atual</label>
    <input type="number" id="km" placeholder="Ex: 125000">
  </div>

  <div class="field">
    <label>Quantidade (Litros)</label>
    <input type="number" id="litros" step="0.01" placeholder="Ex: 45.50">
  </div>

  <div class="field">
    <label>Valor Total (R$)</label>
    <input type="number" id="valor" step="0.01" placeholder="Ex: 250.00">
  </div>

  <div class="field">
    <label>Observação</label>
    <textarea id="obs" placeholder="Ex: Posto Ipiranga, troca de óleo..."></textarea>
  </div>

  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
  
  <div id="loading" class="loader"></div>
  <div id="msg"></div>
</div>

<script>
  const URL_SCRIPT = "SUA_URL_AQUI"; // COLOQUE A URL DO SEU DEPLOY

  function salvar() {
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loading');
    const msg = document.getElementById('msg');
    
    btn.disabled = true;
    msg.style.display = "none";
    loader.style.display = "block";

    const dados = {
      veiculo: document.getElementById('veiculo').value,
      tipo: document.getElementById('tipo').value,
      km: parseFloat(document.getElementById('km').value),
      litros: parseFloat(document.getElementById('litros').value) || 0,
      valor: parseFloat(document.getElementById('valor').value) || 0,
      obs: document.getElementById('obs').value
    };

    fetch(URL_SCRIPT, {
      method: 'POST',
      mode: 'no-cors', // Importante para evitar erro de CORS no Apps Script
      body: JSON.stringify(dados)
    })
    .then(() => {
      loader.style.display = "none";
      btn.disabled = false;
      msg.innerHTML = "Registro salvo com sucesso! ⛽✅🚀";
      msg.style.display = "block";
      
      // Limpa os campos
      document.getElementById('km').value = "";
      document.getElementById('litros').value = "";
      document.getElementById('valor').value = "";
      document.getElementById('obs').value = "";
      
      atualizarInfo();
    })
    .catch(err => {
      loader.style.display = "none";
      btn.disabled = false;
      alert("Erro ao salvar!");
    });
  }

  function atualizarInfo() {
    // Sua função que busca os dados km e média no Apps Script via doGet
  }

  window.onload = atualizarInfo;
</script>

</body>
</html>
