<!DOCTYPE html>
<html lang="pt-br">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Importação da Fonte Moderna Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --primary: #2e7d32; 
      --bg: #f0f2f5; 
      --card-bg: #ffffff;
      --text: #2c3e50;
      --error: #e74c3c;
    }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      color: var(--text);
    }

    .card { 
      background: var(--card-bg); 
      padding: 25px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
      width: 100%; 
      max-width: 400px; 
    }

    h2 { 
      color: var(--primary); 
      text-align: center; 
      margin-top: 0; 
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .stats { 
      background: #f1f8e9; 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      border-left: 6px solid var(--primary); 
    }

    .stats p { margin: 5px 0; font-size: 14px; }

    .field { margin-bottom: 18px; }

    label { 
      display: block; 
      margin-bottom: 6px; 
      font-weight: 600; 
      font-size: 11px; 
      color: #7f8c8d; 
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select, textarea { 
      width: 100%; 
      padding: 12px; 
      border: 1.5px solid #e0e0e0; 
      border-radius: 10px; 
      box-sizing: border-box; 
      font-size: 15px; 
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
    }

    button { 
      width: 100%; 
      padding: 14px; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      font-weight: 600; 
      cursor: pointer; 
      font-size: 16px; 
      margin-top: 10px;
      transition: all 0.2s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background: #bdc3c7; cursor: not-allowed; }

    #msg { text-align: center; margin-top: 15px; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>
  
  <div id="historico" class="stats">
    <p>📊 <strong>Último KM:</strong> <span id="lastKm">...</span> km</p>
    <p>⛽ <strong>Média Anterior:</strong> <span id="lastMedia">...</span> km/l</p>
  </div>

  <div class="field">
    <label>Veículo</label>
    <select id="veiculo" onchange="atualizarInfo()">
      <option value="CrossFox">CrossFox (Red)</option>
      <option value="Doblò">Doblò</option>
      <option value="Outros">Caminhão 01</option>
    </select>
  </div>

  <div class="field">
    <label>Tipo de Registro</label>
    <select id="tipo">
      <option value="Abastecimento">⛽ Abastecimento</option>
      <option value="Manutenção">🛠️ Manutenção</option>
    </select>
  </div>

  <div class="field">
    <label>KM Atual</label>
    <input type="number" id="km" placeholder="000.000" inputmode="numeric">
  </div>

  <div class="field">
    <label>Litros / Quantidade</label>
    <input type="number" id="litros" step="0.01" placeholder="0,00">
  </div>

  <div class="field">
    <label>Valor Total (R$)</label>
    <input type="number" id="valor" step="0.01" placeholder="R$ 0,00">
  </div>

  <div class="field">
    <label>Observação</label>
    <textarea id="obs" rows="2" placeholder="Notas sobre o serviço..."></textarea>
  </div>

  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
  <div id="msg"></div>
</div>

<script>
  // ATENÇÃO: COLOQUE SUA URL DO GOOGLE ABAIXO
  const WEB_APP_URL = "COLE_AQUI_SUA_URL_DO_APPS_SCRIPT";

  window.onload = atualizarInfo;

  function atualizarInfo() {
    const veiculo = document.getElementById("veiculo").value;
    fetch(`${WEB_APP_URL}?veiculo=${veiculo}`)
      .then(res => res.json())
      .then(res => {
        document.getElementById("lastKm").innerText = res.km;
        document.getElementById("lastMedia").innerText = res.media;
      })
      .catch(err => console.error("Erro ao carregar dados iniciais:", err));
  }

  async function salvar() {
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const lastKm = parseFloat(document.getElementById("lastKm").innerText) || 0;
    const veiculo = document.getElementById("veiculo").value;
    
    const dados = {
      veiculo: veiculo,
      tipo: document.getElementById("tipo").value,
      km: parseFloat(document.getElementById("km").value),
      litros: parseFloat(document.getElementById("litros").value) || 0,
      valor: parseFloat(document.getElementById("valor").value) || 0,
      obs: document.getElementById("obs").value
    };

    // Validação de KM
    if (!dados.km || dados.km <= lastKm) {
      msg.innerText = "⚠️ Erro: KM deve ser maior que " + lastKm;
      msg.style.color = "var(--error)";
      return;
    }

    btn.disabled = true;
    msg.innerText = "⏳ Gravando na planilha...";
    msg.style.color = "orange";

    try {
      // Envio com no-cors para evitar travamentos de rede externa
      await fetch(WEB_APP_URL, { 
        method: "POST", 
        body: JSON.stringify(dados),
        mode: 'no-cors'
      });

      // Busca a média atualizada da aba Resumo para o Pop-up
      const responseMedia = await fetch(`${WEB_APP_URL}?getMediaResumo=${veiculo}`);
      const mediaGeral = await responseMedia.text();

      alert(`✅ Registro concluído!\n\nVeículo: ${veiculo}\nTipo: ${dados.tipo}\n\n📊 Média Geral (Resumo): ${mediaGeral} km/l`);
      
      // Reseta o formulário
      document.getElementById("km").value = "";
      document.getElementById("litros").value = "";
      document.getElementById("valor").value = "";
      document.getElementById("obs").value = "";
      msg.innerText = "✅ Salvo com sucesso!";
      msg.style.color = "var(--primary)";
      
      atualizarInfo();
      btn.disabled = false;

    } catch (error) {
      console.error("Erro no processo:", error);
      msg.innerText = "❌ Erro ao salvar. Verifique a internet.";
      msg.style.color = "var(--error)";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
