<!DOCTYPE html>
<html>
<head>
  <style>
    /* Estilos existentes mantidos e novos adicionados */
    .card { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 400px; margin: auto; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
    
    /* BOTÃO E LOADER LUXO */
    #btn { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    #btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: none;
      margin: 15px auto;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* MENSAGEM MODERNA */
    #msg {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      color: #27ae60;
      display: none;
      font-size: 1.1em;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Frota Palhares 🚚</h2>
  
  <div id="historico" class="stats">
    <p>📊 <strong>Último Registro:</strong> <span id="lastKm">Carregando...</span> km</p>
    <p>⛽ <strong>Média Anterior:</strong> <span id="lastMedia">--</span> km/l</p>
  </div>

  <div class="field">
    <label>Veículo</label>
    <select id="veiculo" onchange="atualizarInfo()">
      <option value="CrossFox">CrossFox (Red)</option>
      <option value="Doblò">Doblò</option>
      <option value="Outros">Caminhão 01</option>
    </select>
  </div>

  <div class="field">
    <label>Tipo de Registro</label>
    <select id="tipo">
      <option value="Abastecimento">⛽ Abastecimento</option>
      <option value="Manutenção">🛠️ Manutenção</option>
    </select>
  </div>

  <div class="field">
    <label>KM Atual</label>
    <input type="number" id="km" placeholder="Ex: 125000">
  </div>
  
  <button id="btn" onclick="salvar()">SALVAR REGISTRO</button>
  
  <div id="loading" class="loader"></div>
  <div id="msg"></div>
</div>

<script>
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw7rwKhDnl5hAsyuJhi4iHNG3h78Tz1uwfDHpr5xl6DHsht1n4pY722hvZxQmY9caiapw/exec"; // COLE AQUI A URL DO APPS SCRIPT

  function salvar() {
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loading');
    const msg = document.getElementById('msg');
    
    // 1. Inicia Visual de Carregamento
    btn.disabled = true;
    msg.style.display = "none";
    loader.style.display = "block";

    const dados = {
      veiculo: document.getElementById('veiculo').value,
      tipo: document.getElementById('tipo').value,
      km: parseFloat(document.getElementById('km').value),
      // Adicione os outros campos conforme seu formulário
    };

    fetch(URL_SCRIPT, {
      method: 'POST',
      body: JSON.stringify(dados)
    })
    .then(res => res.text())
    .then(txt => {
      loader.style.display = "none";
      btn.disabled = false;
      
      if (txt === "Sucesso") {
        // MENSAGEM MODERNA E COM EMOJI
        msg.innerHTML = "Registro salvo com sucesso! ⛽✅🚀";
        msg.style.display = "block";
        document.getElementById('km').value = ""; // Limpa campo
        atualizarInfo(); // Atualiza os números no topo
      } else {
        msg.innerHTML = "Erro ao salvar ❌";
        msg.style.color = "#c0392b";
        msg.style.display = "block";
      }
    })
    .catch(err => {
      loader.style.display = "none";
      btn.disabled = false;
      console.error(err);
    });
  }

  function atualizarInfo() {
    // Sua lógica de carregar os dados iniciais do doGet
    // que preenche o #lastKm e #lastMedia
  }

  // Carrega ao iniciar
  window.onload = atualizarInfo;
</script>

</body>
</html>
